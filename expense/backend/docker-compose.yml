version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: expense_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    depends_on:
      - postgres
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/expense_tracker
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: VGhpc0lzQVNlY3VyZUFuZExvbmdCYXNlNjRLZXlGb3JKV1QxMjM0NTY3ODkw
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8080:8080"

volumes:
  pgdata:
